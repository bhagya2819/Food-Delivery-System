server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # User Service
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**

        # Restaurant Service
        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/restaurants/**

        # Cart Service
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/cart/**

        # Order Service
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**

        # Delivery Service
        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/delivery/**

        # Payment Service
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**

        # Notification Service
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**

        # Search Service
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/search/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173,http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
